  start_date: '2018-01-01'
  end_date: '2026-12-31'
  cache_path: ./data.csv
  fred_api_key: ${oc.env:FRED_API_KEY}
  split_date: '2023-01-01'
model:
  name: cnn
  dimensions:
  - 64
  - 32
  - 16
  dilations:
  - 1
  - 2
  - 4
  kernel_size: 3
  activation: leaky_relu
  prediction_steps: 3
training:
  epochs: 1000
  learning_rate: 0.002
  batch_size: 128
  optimizer: adam
  weight_decay: 5.0e-05
  scheduler:
    enabled: false
    type: cosine
    warmup_steps: 50
  early_stopping:
    enabled: true
    patience: 20
    min_delta: 1.0e-05
  mre:
    enabled: true
    update_mode: simultaneous
    lambda_entropy: 0.02
    lambda_moment: 0.05
    epochs_phase1: 10
prediction:
  window_size: 15
  stride: 3
buyer:
  agent: ddpg
  initial_capital: 100.0
  transaction_cost: 0.001
  buffer_capacity: 250000
  log_every: 1
  n_episodes: 10
  batch_size: 4096
  warmup: 5000
  es_patience: 75
  es_metric: sharpe
  lambda_concentration: 0.6
  lambda_inaction: 0.2
  action_threshold: 0.005
  inaction_threshold: 0.05
  reward_clip: 10.0
  sell_profit_bonus: 0.002
  lambda_loss: 0.5
  loss_threshold: -0.5
  max_position_pct: 0.2
  max_holding_steps: 120
  forced_sell_cooldown_steps: 20
  bars_per_year: 98280
  ddpg:
    actor_hidden:
    - 512
    - 256
    - 128
    critic_hidden:
    - 512
    - 256
    - 128
    lr_actor: 0.0001
    lr_critic: 0.0003
    gamma: 0.98
    tau: 0.005
    update_every: 50
    noise_sigma: 0.15
    noise_decay: 0.995
    noise_floor: 0.02
  lambda_thermo: 0.15
  stress_sell_threshold: 1.0
  stress_buy_threshold: -0.5
  efficiency_penalty_thresh: 1.5
  thermo_bonus_sell: 0.002
  thermo_bonus_buy: 0.001
  thermo_penalty_buy: 0.003
  trust_min: 0.35
  trust_max: 0.65
  episodic_episodes: 20
  ensemble_temperature: 0.5
  warm_start_kl_threshold: 2.0
paths:
  output_dir: ${hydra:runtime.output_dir}
  results_dir: ./results
  checkpoint_dir: ./checkpoints
frequency:
  interval: 2m
  label: minute
  bars_per_day: 390
  bars_per_year: 98280
  cache_path: ./data_minute.csv
  max_history_days: 60
  split_ratio: 0.8
step: trade
