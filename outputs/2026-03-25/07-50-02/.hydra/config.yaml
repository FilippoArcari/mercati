  - MICH
  - FEDFUNDS
  - GS10
  - T10Y2Y
  - VIXCLS
  - STLFSI4
  - BAMLH0A0HYM2
  - CP0000EZ19M086NEST
  - CP0000ITM086NEST
  - IR3TIB01EZM156N
  start_date: '2018-01-01'
  end_date: '2025-12-31'
  cache_path: ./data.csv
  fred_api_key: ${oc.env:FRED_API_KEY}
  split_date: '2023-01-01'
model:
  name: cnn
  dimensions:
  - 64
  - 32
  - 16
  dilations:
  - 1
  - 2
  - 4
  kernel_size: 3
  activation: leaky_relu
training:
  epochs: 1000
  learning_rate: 0.001
  batch_size: 32
  optimizer: adam
  weight_decay: 1.0e-05
  scheduler:
    enabled: false
    type: cosine
    warmup_steps: 100
  early_stopping:
    enabled: false
    patience: 50
    min_delta: 1.0e-06
  mre:
    enabled: true
    update_mode: simultaneous
    lambda_entropy: 0.05
    lambda_moment: 0.1
    epochs_phase1: 30
prediction:
  window_size: 30
  stride: 1
buyer:
  agent_type: ddpg
  initial_capital: 100.0
  transaction_cost: 0.001
  buffer_capacity: 100000
  batch_size: 32
  n_episodes: 100
  warmup: 3000
  log_every: 10
  es_patience: 20
  es_metric: sharpe
  ddpg:
    actor_hidden:
    - 512
    - 256
    - 128
    critic_hidden:
    - 512
    - 256
    - 128
    lr_actor: 0.0001
    lr_critic: 0.0003
    gamma: 0.99
    tau: 0.005
    update_every: 10
    noise_sigma: 0.2
    noise_decay: 0.995
    noise_floor: 0.05
  dqn:
    n_actions: 5
    hidden:
    - 512
    - 256
    - 128
    lr: 0.0003
    gamma: 0.99
    tau: 0.005
    update_every: 4
    target_update_every: 100
    epsilon_start: 1.0
    epsilon_end: 0.05
    epsilon_decay: 0.992
paths:
  output_dir: ${hydra:runtime.output_dir}
  results_dir: ./results
  checkpoint_dir: ./checkpoints
frequency:
  interval: 1d
  label: daily
  bars_per_day: 1
  bars_per_year: 252
  cache_path: ./data_daily.csv
  max_history_days: null
  split_ratio: null
step: train
