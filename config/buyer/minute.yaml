# config/buyer/minute.yaml — INTRADAY OVERRIDE (2m bars)
# ═══════════════════════════════════════════════════════════
# FIX v7.0 — Root cause fixes per BUY-only + Ruin + Sharpe
# ═══════════════════════════════════════════════════════════

agent: ddpg
initial_capital:  100.0
transaction_cost: 0.001

buffer_capacity: 100000
log_every:       50

# ── Training ──────────────────────────────────────────────────────────────────
n_episodes:  300
batch_size:  512
warmup:      500
es_patience: 40
es_metric:   sharpe

# ── Reward shaping ────────────────────────────────────────────────────────────
# [Fix F] CRITICO: abbassato da 10.0 a 0.05
reward_clip: 0.05

lambda_concentration: 0.6
lambda_inaction:      0.005
action_threshold:     0.005
inaction_threshold:   0.05

# [Fix D3] Bonus per qualsiasi SELL eseguito (anche in perdita)
sell_unconditional_bonus: 0.004
sell_profit_bonus:        0.08

lambda_loss:    0.5
loss_threshold: -0.5

# ── Gestione posizioni ────────────────────────────────────────────────────────
# [Fix D2] 0.20 → 0.05: ogni ticker usa max il 5% del cash disponibile
max_position_pct: 0.05

# [Fix D2] Nuovo: cap globale esposizione totale investita
max_total_exposure_pct: 0.40

# [Fix B3] 60 → 15 barre (30 min): forced sell inietta SELL nel buffer
max_holding_steps:          15
forced_sell_cooldown_steps:  3

# ── [Fix B4] Imbalance buy/sell ───────────────────────────────────────────────
lambda_imbalance:    1.0
imbalance_threshold: 1.5

# Su 51 ticker: 0.10 → max ~5 posizioni aperte contemporaneamente
concentration_threshold: 0.10

# ── [Fix C1] Ruin prevention ──────────────────────────────────────────────────
# [Fix D4] 0.30 → 0.70: stop a -30% drawdown invece di -70%
ruin_stop_pct: 0.70
ruin_penalty:  50.0

# ── [Fix C4] Urgency holding crescente ───────────────────────────────────────
holding_urgency_start: 8
holding_urgency_rate:  0.003
holding_urgency_max:   0.02

# ── DDPG ─────────────────────────────────────────────────────────────────────
ddpg:
  actor_hidden:  [256, 128]
  critic_hidden: [256, 128]
  lr_actor:      0.0003
  lr_critic:     0.001
  gamma:         0.95
  tau:           0.01
  update_every:  10
  noise_sigma:   0.20
  noise_decay:   0.998
  noise_floor:   0.05

# ── Thermo shaping ────────────────────────────────────────────────────────────
lambda_thermo:             0.15
stress_sell_threshold:     1.0
stress_buy_threshold:     -0.5
efficiency_penalty_thresh: 1.5
thermo_bonus_sell:         0.002
thermo_bonus_buy:          0.001
thermo_penalty_buy:        0.003

# ── Trust range ───────────────────────────────────────────────────────────────
trust_min: 0.35
trust_max: 0.65

episodic_episodes:       20
ensemble_temperature:    0.5
warm_start_kl_threshold: 2.0