# config/buyer/intraday_override.yaml
# ── BUYER INTRADAY OVERRIDE ───────────────────────────────────────────────────
# Caricato SOLO quando frequency=minute (via _apply_frequency_defaults in main.py)
# Sovrascrive config/buyer/default.yaml con parametri specifici per intraday.
#
# Fix applicati rispetto alla versione precedente:
#   [Fix #1] reward_clip: 10.0 — impedisce esplosioni reward quando prev_value ≈ 0
#            (causa degli ep 53/58 con portfolio da $48M/$64M)
#   [Fix #2] forced_sell_cooldown_steps: 20 — impedisce rebuy immediato post-espulsione
#   [Fix #3] sell_profit_bonus esplicito
#   [Fix #4] new_value calcolato prima di _step += 1 (stesso frame di prezzi)
#   [Fix #5] trust_min: 0.35 / trust_max: 0.65 — thermo finalmente attivo con trust medio 0.477
#            Con i vecchi valori (0.40/0.80) → w ≈ 0.19 (thermo quasi spento)
#            Con i nuovi valori (0.35/0.65) → w ≈ 0.42 (thermo a ~40% della forza massima)
#   [Fix #6] bars_per_year passato all'env per Sharpe corretto su dati 2-min
#   [Fix #7] inaction_threshold separato — più alto per evitare bypass con micro-segnali
#   [Fix #8] next_state reale anche quando done (no zero-vector artificiale nel buffer)
#   [Fix #9] Off-by-one thermo risolto via _thermo_at(step) — log e reward ora allineati
#   [Fix #10] w_global ora moltiplicatore esterno su tutti i bonus/penalità thermo

agent: ddpg
initial_capital:  100.0
transaction_cost: 0.001

buffer_capacity: 250000
log_every:       1

# ── Training ──────────────────────────────────────────────────────────────────
n_episodes:  500
batch_size:  256
warmup:      5000
es_patience: 75
es_metric:   sharpe

# ── Reward shaping ────────────────────────────────────────────────────────────
lambda_concentration: 0.6
lambda_inaction:      0.2
action_threshold:     0.005
inaction_threshold:   0.05   # [Fix #7] più alto di action_threshold per evitare bypass

# [Fix #1] Clip del base_reward per prevenire esplosioni numeriche.
# Se prev_value ≈ 0 (portfolio azzerato), senza clip il reward può diventare +10k.
# Il clip a ±10 è conservativo: il rendimento reale per step è nell'ordine di ±0.1%.
reward_clip: 10.0

# [Fix #3] Bonus per ogni vendita profittevole
sell_profit_bonus: 0.002

# Penalità per perdite eccessive
lambda_loss:    0.5
loss_threshold: -0.5

# ── Gestione posizioni ────────────────────────────────────────────────────────
max_position_pct:           0.20
max_holding_steps:          120
forced_sell_cooldown_steps: 20   # [Fix #2] cooldown post-forced-sell

# ── Sharpe corretto per intraday ─────────────────────────────────────────────
# [Fix #6] Per 2-min: 390 barre/giorno × 252 giorni = 98280
bars_per_year: 98280

# ── DDPG ─────────────────────────────────────────────────────────────────────
ddpg:
  actor_hidden:  [512, 256, 128]
  critic_hidden: [512, 256, 128]
  lr_actor:      0.0001
  lr_critic:     0.0003
  gamma:         0.98
  tau:           0.005
  update_every:  5
  noise_sigma:   0.15
  noise_decay:   0.995
  noise_floor:   0.02

# ── Thermo shaping ────────────────────────────────────────────────────────────
lambda_thermo:             0.15
stress_sell_threshold:     1.0
stress_buy_threshold:     -0.5
efficiency_penalty_thresh: 1.5
thermo_bonus_sell:         0.002
thermo_bonus_buy:          0.001
thermo_penalty_buy:        0.003

# [Fix #5] Trust continuo ridisegnato.
#
# PROBLEMA PRECEDENTE: trust_min=0.40, trust_max=0.80
#   Con trust medio osservato = 0.477:
#   w = (0.477 - 0.40) / (0.80 - 0.40) = 0.077 / 0.40 = 0.19
#   Bonus effettivo = 0.002 * 0.19 = 0.00038 → trascurabile
#
# SOLUZIONE: abbassare trust_min e ridurre il range
#   Con trust_min=0.35, trust_max=0.65:
#   w = (0.477 - 0.35) / (0.65 - 0.35) = 0.127 / 0.30 = 0.42
#   Bonus effettivo = 0.002 * 0.42 = 0.00084 → ~2x più impattante
#
# [Fix #10] w_global: con trust medio 0.477 → w_global = 0.42
#   Prodotto w_stress * w_global = 0.42 * 0.42 = 0.18
#   Thermo opera al 18% della forza massima — se vuoi più impatto,
#   aumenta i bonus (thermo_bonus_sell, thermo_bonus_buy) invece di
#   modificare trust_min/trust_max, per mantenere la calibrazione del rischio.
trust_min: 0.35
trust_max: 0.65