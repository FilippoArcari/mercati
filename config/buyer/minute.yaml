# config/buyer/minute.yaml (ex intraday_override)
# ── BUYER INTRADAY OVERRIDE ───────────────────────────────────────────────────
# Caricato SOLO quando frequency=minute.
#
# FIX v5.0 — BUY/SELL IMBALANCE:
#   [Fix B1] Tutti i parametri reward shaping ora vengono effettivamente passati
#            a TradingEnv (prima erano nel YAML ma ignorati dal codice Python).
#   [Fix B2] sell_mult_expansion portato a 1.2 nel ThermoRewardConfig (era 0.9,
#            che penalizzava attivamente le vendite in regime espansivo).
#   [Fix B3] max_holding_steps abbassato a 60 (2 ore su 2m) da 120 (4 ore):
#            il forced sell ora si attiva il doppio delle volte.
#   [Fix B4] lambda_imbalance e imbalance_threshold: nuovi parametri che
#            introducono una penalità crescente quando buy/sell ratio > 2.0.
#   [Fix B6] sell_profit_bonus portato a 0.015 da 0.002 (7.5x più alto):
#            il bonus è proporzionale al gain realizzato, quindi vendere in
#            profitto diventa significativamente più attraente.

agent: ddpg
initial_capital:  100.0
transaction_cost: 0.001

buffer_capacity: 250000
log_every:       1

# ── Training ──────────────────────────────────────────────────────────────────
n_episodes:  500
batch_size:  4096
warmup:      5000
es_patience: 75
es_metric:   sharpe

# ── Reward shaping (ora effettivamente usati in TradingEnv) ───────────────────
lambda_concentration:    0.6
lambda_inaction:         0.2
action_threshold:        0.005
inaction_threshold:      0.05
reward_clip:             10.0

# [Fix B6] Portato da 0.002 a 0.015. Il bonus è proporzionale al gain %
# (max 3x), quindi vendere a +1% genera un bonus di ~0.030. Con 0.002
# era impercettibile rispetto alla reward base.
sell_profit_bonus: 0.015

# Penalità per perdite eccessive
lambda_loss:    0.5
loss_threshold: -0.5

# ── Gestione posizioni ────────────────────────────────────────────────────────
max_position_pct:  0.20

# [Fix B3] Abbassato da 120 a 60 barre (120 min → 60 min su 2m bars).
# Il forced sell ora scatta dopo 2 ore invece di 4, forzando il turnover.
max_holding_steps:          60
forced_sell_cooldown_steps: 10   # abbassato da 20

# ── [Fix B4] Parametri imbalance buy/sell (nuovi) ────────────────────────────
# Penalità episodica quando cumulative_buys / cumulative_sells > imbalance_threshold.
# Scala linearmente: a ratio=4.0 la penalità è piena (lambda_imbalance = 0.3).
lambda_imbalance:    0.3
imbalance_threshold: 2.0

# Frazione di ticker che possono essere aperti contemporaneamente prima della
# penalità concentrazione. Su 51 ticker: 0.35 → max ~18 posizioni aperte.
concentration_threshold: 0.35

# ── Sharpe corretto per intraday ─────────────────────────────────────────────
bars_per_year: 98280

# ── DDPG ─────────────────────────────────────────────────────────────────────
ddpg:
  actor_hidden:  [512, 256, 128]
  critic_hidden: [512, 256, 128]
  lr_actor:      0.0001
  lr_critic:     0.0003
  gamma:         0.98
  tau:           0.005
  update_every:  50
  noise_sigma:   0.15
  noise_decay:   0.995
  noise_floor:   0.02

# ── Thermo shaping ────────────────────────────────────────────────────────────
lambda_thermo:             0.15
stress_sell_threshold:     1.0
stress_buy_threshold:     -0.5
efficiency_penalty_thresh: 1.5
thermo_bonus_sell:         0.002
thermo_bonus_buy:          0.001
thermo_penalty_buy:        0.003

# ── Trust range ───────────────────────────────────────────────────────────────
# Con trust medio 0.477:
#   w = (0.477 - 0.35) / (0.65 - 0.35) = 0.127 / 0.30 = 0.42
# Thermo opera al ~42% della forza massima.
trust_min: 0.35
trust_max: 0.65

episodic_episodes:       20
ensemble_temperature:    0.5
warm_start_kl_threshold: 2.0