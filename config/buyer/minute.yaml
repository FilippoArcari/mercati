# ── BUYER INTRADAY OVERRIDE ───────────────────────────────────────────────────
# Loaded ONLY when frequency=minute (via _apply_frequency_defaults in main.py)
# Overrides config/buyer/default.yaml with intraday-specific aggressive parameters

# config/buyer/intraday_override.yaml
agent: ddpg
initial_capital:  100.0
transaction_cost: 0.001

buffer_capacity: 250000        # Aumentato per maggiore memoria storica
log_every:       1

# Training
n_episodes:     500           # Lascia fare all'early stopping se converge prima
batch_size:     256           # Sfrutta la GPU e stabilizza il gradiente
warmup:         5000          # Fagli accumulare un buon buffer casuale prima di addestrare
es_patience:    50            
es_metric:       sharpe

# Reward shaping - Coerente con la volontà di essere aggressivi
lambda_concentration: 0.6     # Penalità alta per forzare diversificazione
lambda_inaction:      0.2     # Penalità moderata/alta per evitare l'immobilità
action_threshold:     0.005   # Molto sensibile

# DDPG Tuning per Colab GPU
ddpg:
  actor_hidden:  [512, 256, 128]
  critic_hidden: [512, 256, 128]
  lr_actor:      0.0001        # Ridotto per stabilità policy
  lr_critic:     0.0003        # Ridotto per stabilità Q-value
  gamma:         0.98          # Ottimo per orizzonti intraday (max_holding 60)
  tau:           0.005         # Stabilità della rete target
  update_every:  5             # Con batch da 256, aggiornare ogni 5 step è bilanciato
  noise_sigma:   0.15          # Più esplorazione iniziale
  noise_decay:   0.995         # Decadimento più morbido
  noise_floor:   0.02          # Non azzerarlo mai del tutto

# Thermo Parameters (mantenuti intatti)
lambda_thermo: 0.15              
stress_sell_threshold: 1.0       
stress_buy_threshold: -0.5       
efficiency_penalty_thresh: 1.5   
thermo_bonus_sell: 0.002
thermo_bonus_buy: 0.001
thermo_penalty_buy: 0.003