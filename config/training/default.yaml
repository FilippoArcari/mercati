# ═══════════════════════════════════════════════════════════════════════════════
# TRAINING CONFIG: DAILY (End-of-Day Trading)
# ═══════════════════════════════════════════════════════════════════════════════
# Strategia: Momentum e mean-reversion lentamente varianti. Pattern settimanali.
# Dati: 252 closing price/anno → ~2000 campioni dopo windowing (w=30, stride=1)
# Obiettivo: Convergenza lenta e stabile, generalizzazione su lungo termine

# CNN predictor learning
epochs: 1000                  # ← Lungo (convergenza pattern giornalieri è lenta)
learning_rate: 0.001         # ← Conservativo (dataset piccolo ~2000 sample)
batch_size: 32               # ← Piccolo (pochi campioni, batch piccoli stabili)
optimizer: adam
weight_decay: 1.0e-5         # ← Minimo (poco rischio overfitting con pochi dati)

scheduler:
  enabled: false
  type: cosine
  warmup_steps: 100

early_stopping:
  enabled: true
  patience: 50                # ← Alto (convergenza lenta, aspetta stabilizzazione)
  min_delta: 1.0e-5

# Maximum Relative Entropy (Giffin, 2009)
# Vincolo sui momenti per evitare degenerazione su trend mono-direzionali
mre:
  enabled: true
  update_mode: simultaneous
  
  lambda_entropy: 0.05        # ← Conservativo (limita KL divergence, usa prior)
  lambda_moment: 0.1          # ← Conservativo (vincolo morbido, focalizza su MSE)
  
  # moment_target: [100.0, 250.0]  # opzionale: usa media training set se assente
  
  epochs_phase1: 30           # solo per update_mode: sequential
 